<!DOCTYPE html>
<html lang="zh">
<head>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta charset="UTF-8">
<title>tclaw</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: system-ui, sans-serif; background: #f5f5f5; height: 100vh; display: flex; flex-direction: column; }

header { background: #222; color: #fff; padding: 10px 20px; display: flex; align-items: center; gap: 12px; }
header input { flex: 1; padding: 6px 10px; border: none; border-radius: 4px; font-size: 14px; }
header button { padding: 6px 16px; border: none; border-radius: 4px; cursor: pointer; }
#connectBtn { background: #4caf50; color: #fff; }
#connectBtn.disconnected { background: #f44336; }
#sendBtn { background: #2196f3; color: #fff; }

#chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
.msg { max-width: 80%; padding: 10px 14px; border-radius: 8px; line-height: 1.6; font-size: 14px; flex-shrink: 0; }
.msg.user { background: #2196f3; color: #fff; align-self: flex-end; white-space: pre-wrap; }
.msg.assistant { background: #fff; color: #333; align-self: flex-start; border: 1px solid #e0e0e0; }
.msg.assistant p { margin: 0 0 8px; }
.msg.assistant p:last-child { margin-bottom: 0; }
.msg.assistant pre { background: #f5f5f5; padding: 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 8px 0; }
.msg.assistant code { background: #f0f0f0; padding: 2px 6px; border-radius: 3px; font-size: 13px; }
.msg.assistant pre code { background: none; padding: 0; }
.msg.assistant ul, .msg.assistant ol { margin: 4px 0; padding-left: 20px; }
.msg.assistant table { border-collapse: collapse; margin: 8px 0; font-size: 13px; }
.msg.assistant th, .msg.assistant td { border: 1px solid #ddd; padding: 6px 10px; text-align: left; }
.msg.assistant th { background: #f5f5f5; font-weight: 600; }
.msg.assistant blockquote { border-left: 3px solid #e0e0e0; margin: 8px 0; padding: 4px 12px; color: #666; }
.msg.tool { background: #fff3e0; color: #e65100; align-self: flex-start; font-size: 13px; white-space: pre-wrap; }
.msg.system { background: #e8f5e9; color: #2e7d32; align-self: center; font-size: 12px; }

/* ── 组件浮动窗口 ── */
.component-box { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); min-width: 360px; max-width: 600px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.component-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 14px; }
.component-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 0 4px; line-height: 1; }
.component-close:hover { color: #333; }
.component-body { flex: 1; overflow: auto; }
.component-body iframe { width: 100%; min-height: auto; height: 400px; border: none; }

/* ── 固定/内嵌组件 ── */
.component-inline { margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.component-inline .component-header { background: #fafafa; }
.component-inline iframe { width: 100%; min-height: auto; height: 300px; border: none; }

/* ── 日志面板 ── */
#logPanel { display: none; height: 200px; border-top: 2px solid #333; background: #1a1a1a; color: #ccc; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 12px; flex-direction: column; }
#logPanel.open { display: flex; }
#logHeader { display: flex; align-items: center; justify-content: space-between; padding: 4px 12px; background: #222; border-bottom: 1px solid #444; }
#logHeader span { font-weight: 600; font-size: 13px; color: #fff; }
#logHeader button { background: none; border: 1px solid #555; color: #ccc; padding: 2px 8px; border-radius: 3px; cursor: pointer; font-size: 11px; }
#logHeader button:hover { background: #333; color: #fff; }
#logBody { flex: 1; overflow-y: auto; padding: 4px 8px; line-height: 1.6; }
.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line.ERROR { color: #f44336; }
.log-line.WARNING { color: #ff9800; }
.log-line.INFO { color: #4caf50; }
.log-line.DEBUG { color: #888; }
#logToggle { background: none; border: 1px solid #555; color: #aaa; padding: 4px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
#logToggle:hover { background: #333; color: #fff; }

.component-box { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); min-width: 360px; max-width: 600px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.component-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 14px; }
.component-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 0 4px; line-height: 1; }
.component-close:hover { color: #333; }
.component-body { flex: 1; overflow: auto; }
.component-body iframe { width: 100%; min-height: auto; height: 400px; border: none; }
.component-inline { margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.component-inline .component-header { background: #fafafa; }
.component-inline iframe { width: 100%; min-height: auto; height: 300px; border: none; }
</style>
</head>
<body>
<script src="/s/marked.min.js"></script>
<!-- 主布局：侧边栏 + 内容区 -->
<!-- 登录页 -->
<div id="loginPage" style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background:#f5f5f5">
  <div style="background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);padding:40px;min-width:400px;text-align:center">
    <h1 style="margin:0 0 24px;font-size:28px;color:#222">tclaw</h1>
    <p style="color:#888;margin:0 0 24px;font-size:14px">AI Agent 框架</p>
    <input id="wsUrl" placeholder="WebSocket URL" style="width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:20px;box-sizing:border-box" />
    <button id="connectBtn" class="disconnected" onclick="toggleConnect()" style="width:100%;padding:12px;border:none;border-radius:8px;font-size:16px;cursor:pointer;background:#4caf50;color:#fff">连接</button>
  </div>
</div>

<!-- 主界面 -->
<div id="app" style="display:none;height:100vh;background:#f5f5f5">

<!-- 侧边栏 -->
<div id="sidebar" style="width:200px;background:#1a1a2e;color:#ccc;display:flex;flex-direction:column;flex-shrink:0">
  <div style="padding:16px;font-weight:700;font-size:16px;color:#fff;border-bottom:1px solid #333">tclaw</div>
  <div id="nav-chat" class="nav-item active" onclick="switchTab('chat')" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;border-left:3px solid transparent">💬 聊天</div>
  <div id="nav-sessions" class="nav-item" onclick="switchTab('sessions')" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;border-left:3px solid transparent">📂 会话</div>
  <div id="nav-skills" class="nav-item" onclick="switchTab('skills')" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;border-left:3px solid transparent">🧠 Skills</div>
  <div id="nav-tools" class="nav-item" onclick="switchTab('tools')" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;border-left:3px solid transparent">🛠 Tools</div>
  <div id="nav-extensions" class="nav-item" onclick="switchTab('extensions')" style="padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:14px;border-left:3px solid transparent">🔌 Extensions</div>
  <div style="margin-top:auto;padding:10px 16px;border-top:1px solid #333;display:flex;gap:8px">
    <button id="sidebarDisconnect" onclick="disconnect()" style="flex:1;padding:6px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:#aaa">断开</button>
    <button onclick="toggleLog()" style="padding:6px;border:1px solid #555;border-radius:4px;cursor:pointer;font-size:12px;background:transparent;color:#aaa">📋</button>
  </div>
</div>

<!-- 主内容区 -->
<div id="main" style="flex:1;display:flex;flex-direction:column">

  <!-- 聊天标签 -->
  <div id="tab-chat" class="tab-content" style="display:flex;flex-direction:column;height:100%">
    <!-- Session 选择栏 -->
    <div style="padding:8px 16px;background:#fff;border-bottom:1px solid #e0e0e0;display:flex;align-items:center;gap:8px;flex-shrink:0">
      <select id="sessionSelect" onchange="switchSession(this.value)" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;background:#fff">
        <option value="main">main</option>
      </select>
      <button id="deleteSessionBtn" onclick="deleteSession()" style="padding:6px 10px;border:1px solid #e57373;border-radius:6px;cursor:pointer;background:#fff;color:#e53935;font-size:13px;display:none">✕</button>
      <button onclick="createSession()" style="padding:6px 12px;border:1px solid #4caf50;border-radius:6px;cursor:pointer;background:#e8f5e9;color:#2e7d32;font-size:13px;white-space:nowrap">+ 新建</button>
      <span id="sessionStatus" style="font-size:12px;color:#888;white-space:nowrap"></span>
    </div>
    <div id="chat" style="flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px"></div>
    <!-- 工具面板 -->
    <div id="toolsPanel" style="display:none;padding:12px 16px;border-top:1px solid #e0e0e0;background:#fafafa;flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px;align-items:center">
        <button onclick="resetSession()" style="padding:8px 16px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;font-size:13px">↻ 重置会话</button>
        <button onclick="showCompactDialog()" style="padding:8px 16px;border:1px solid #ff9800;border-radius:6px;cursor:pointer;background:#fff;font-size:13px">📦 压缩上下文</button>
        <button onclick="showScheduler()" style="padding:8px 16px;border:1px solid #2196f3;border-radius:6px;cursor:pointer;background:#e3f2fd;color:#1565c0;font-size:13px">⏰ 定时任务</button>
      </div>
      <!-- 压缩对话框 -->
      <div id="compactDialog" style="display:none;flex-direction:column;gap:6px">
        <textarea id="compactPrompt" placeholder="可选：输入压缩方向，如“请专注于API设计”" style="width:100%;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px;resize:none;box-sizing:border-box;font-family:inherit" rows="2"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="hideCompactDialog()" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;font-size:12px">取消</button>
          <button onclick="doCompact()" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;background:#ff9800;color:#fff;font-size:12px">📦 执行压缩</button>
        </div>
      </div>
      <!-- 定时任务对话框 -->
      <div id="schedulerDialog" style="display:none;flex-direction:column;gap:8px;border-top:1px solid #e0e0e0;padding-top:8px">
        <div style="font-size:13px;font-weight:600;color:#333">⏰ 定时任务</div>
        <div id="schedulerList" style="font-size:12px;color:#666;display:flex;flex-direction:column;gap:4px"></div>
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <input id="schedName" placeholder="任务名" style="flex:1;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px">
        </div>
        <input id="schedMsg" placeholder="消息内容" style="width:100%;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;box-sizing:border-box">
        <div style="display:flex;gap:6px;flex-wrap:wrap">
          <select id="schedType" onchange="toggleSchedType()" style="padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fff">
            <option value="at">指定时间</option>
            <option value="every">每隔</option>
            <option value="cron">Cron</option>
          </select>
          <input id="schedAt" type="datetime-local" style="padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px">
          <input id="schedEvery" placeholder="毫秒(如 60000)" style="display:none;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:120px">
          <input id="schedCron" placeholder="表达式(如 0 */5 *)" style="display:none;padding:6px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;width:160px">
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button onclick="document.getElementById('schedulerDialog').style.display='none'" style="padding:6px 14px;border:1px solid #ddd;border-radius:6px;cursor:pointer;background:#fff;font-size:12px">关闭</button>
          <button onclick="addSchedulerTask()" style="padding:6px 14px;border:none;border-radius:6px;cursor:pointer;background:#2196f3;color:#fff;font-size:12px">+ 添加任务</button>
        </div>
      </div>
    </div>
    <div style="padding:12px 16px;border-top:1px solid #e0e0e0;background:#fff;display:flex;gap:8px">
      <input id="msgInput" placeholder="输入消息..." onkeydown="if(event.key==='Enter') send()" disabled style="flex:1;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px" />
      <button id="sendBtn" onclick="send()" disabled style="padding:10px 20px;border:none;border-radius:8px;cursor:pointer;background:#2196f3;color:#fff;font-size:14px">发送</button>
      <button onclick="toggleTools()" style="padding:10px 14px;border:1px solid #888;border-radius:8px;cursor:pointer;background:#fff;font-size:14px;line-height:1">⚙</button>
    </div>
  </div>

  <!-- 概览标签 -->

  <!-- Skills 标签 -->
  <div id="tab-skills" class="tab-content" style="display:none;flex-direction:column;height:100%">
    <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fff">
      <h2 style="margin:0;font-size:18px;color:#333">🏗 Skills</h2>
      <p style="margin:4px 0 0;font-size:13px;color:#888">已安装的技能</p>
    </div>
    <div id="skills-list" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <!-- Tools 标签 -->
  <div id="tab-tools" class="tab-content" style="display:none;flex-direction:column;height:100%">
    <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fff">
      <h2 style="margin:0;font-size:18px;color:#333">🛠 Tools</h2>
      <p style="margin:4px 0 0;font-size:13px;color:#888">LLM 可调用的工具</p>
    </div>
    <div id="tools-list" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <!-- Extensions 标签 -->
  <div id="tab-extensions" class="tab-content" style="display:none;flex-direction:column;height:100%">
    <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fff">
      <h2 style="margin:0;font-size:18px;color:#333">🔌 Extensions</h2>
      <p style="margin:4px 0 0;font-size:13px;color:#888">系统钩子与中间件</p>
    </div>
    <div id="extensions-list" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px"></div>
  </div>

  <!-- Sessions 标签 -->
  <div id="tab-sessions" class="tab-content" style="display:none;flex-direction:column;height:100%">
    <div style="padding:16px 20px;border-bottom:1px solid #e0e0e0;background:#fff">
      <h2 style="margin:0;font-size:18px;color:#333">📂 会话</h2>
      <p style="margin:4px 0 0;font-size:13px;color:#888">管理工作区与记忆空间</p>
    </div>
    <div id="workspace-list" style="flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px"></div>
  </div>

</div>

<!-- 日志面板（全局） -->
<div id="logPanel" style="display:none;position:fixed;bottom:0;right:0;width:500px;height:300px;border-top:2px solid #333;border-left:2px solid #333;background:#1a1a1a;color:#ccc;font-family:monospace;font-size:12px;flex-direction:column;z-index:9999">
  <div id="logHeader" style="display:flex;align-items:center;justify-content:space-between;padding:4px 12px;background:#222;border-bottom:1px solid #444">
    <span style="font-weight:600;font-size:13px;color:#fff">日志</span>
    <div>
      <button onclick="clearLogs()" style="background:none;border:1px solid #555;color:#ccc;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px">清空</button>
      <button onclick="toggleAutoScroll()" style="background:none;border:1px solid #555;color:#ccc;padding:2px 8px;border-radius:3px;cursor:pointer;font-size:11px">自动滚</button>
    </div>
  </div>
  <div id="logBody" style="flex:1;overflow-y:auto;padding:4px 8px;line-height:1.6"></div>
</div>

</div>

<style>
.nav-item:hover { background: rgba(255,255,255,0.05); }
.nav-item.active { background: rgba(255,255,255,0.1); border-left-color: #4caf50 !important; color: #fff; }

.log-line { white-space: pre-wrap; word-break: break-all; }
.log-line.ERROR { color: #f44336; }
.log-line.WARNING { color: #ff9800; }
.log-line.INFO { color: #4caf50; }
.log-line.DEBUG { color: #888; }

.component-box { background: #fff; border-radius: 12px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); min-width: 360px; max-width: 600px; display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; }
.component-header { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid #eee; font-weight: 600; font-size: 14px; }
.component-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #999; padding: 0 4px; line-height: 1; }
.component-close:hover { color: #333; }
.component-body { flex: 1; overflow: auto; }
.component-body iframe { width: 100%; min-height: auto; height: 400px; border: none; }
.component-inline { margin: 8px 0; border: 1px solid #e0e0e0; border-radius: 8px; overflow: hidden; flex-shrink: 0; }
.component-inline .component-header { background: #fafafa; }
.component-inline iframe { width: 100%; min-height: auto; height: 300px; border: none; }
</style>
<script>
let ws = null;
let sessionId = 'main';
let _switching = false;
let components = {};
var _toolSpans = {};
var logAutoScroll = true;
var logTimer = null;

// ── 标签切换 ──────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-content').forEach(function(el) {
    el.style.display = 'none';
  });
  document.querySelectorAll('.nav-item').forEach(function(el) {
    el.classList.remove('active');
  });
  document.getElementById('tab-' + name).style.display = 'flex';
  var nav = document.getElementById('nav-' + name);
  if (nav) nav.classList.add('active');
  // 按需加载数据
  if (name === 'skills') loadSkills();
  else if (name === 'tools') loadTools();
  else if (name === 'extensions') loadExtensions();
  else if (name === 'sessions') loadSessions();
}

function loadSkills() {
  var el = document.getElementById('skills-list');
  if (el.dataset.loaded) return; el.dataset.loaded = '1';
  el.innerHTML = '<p style="color:#888">加载中...</p>';
  fetch('/api/skills').then(function(r) { return r.json(); }).then(function(data) {
    var skills = data.skills || [];
    if (!skills.length) { el.innerHTML = '<p style="color:#888">暂无技能</p>'; return; }
    el.innerHTML = skills.map(function(s) {
      var checked = s.enabled ? 'checked' : '';
      var shortDesc = (s.description || '').split('\\n')[0].slice(0, 80);
      return '<div class="skill-card" style="background:#fff;border-radius:8px;border:1px solid #e0e0e0;overflow:hidden;flex-shrink:0">' +
        '<div class="skill-header" style="padding:14px 16px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none">' +
        '<div style="flex:1;min-width:0"><strong style="font-size:14px;color:#333;display:block">' + s.id + '</strong>' +
        '<p style="margin:2px 0 0;font-size:13px;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (shortDesc || '\u65e0\u63cf\u8ff0') + '</p></div>' +
        '<label onclick="event.stopPropagation()" style="position:relative;display:inline-block;width:40px;height:22px;flex-shrink:0;cursor:pointer">' +
        '<input type="checkbox" ' + checked + ' onchange="toggleSkill(\'' + s.id + '\', this.checked)" style="opacity:0;width:0;height:0">' +
        '<span class="slider" style="position:absolute;inset:0;background:' + (s.enabled ? '#4caf50' : '#ccc') + ';border-radius:11px;transition:0.3s"></span>' +
        '<span class="slider-dot" style="position:absolute;top:2px;left:' + (s.enabled ? '20px' : '2px') + ';width:18px;height:18px;background:#fff;border-radius:50%;transition:0.3s"></span></label></div>' +
        '<div class="skill-body" style="padding:0 16px 14px;display:none;font-size:13px;color:#555;line-height:1.6;white-space:pre-wrap;max-height:300px;overflow-y:auto"></div></div>';
    }).join('');
    // 填充完整描述 + 绑定事件
    el.querySelectorAll('.skill-card').forEach(function(card, i) {
      var body = card.querySelector('.skill-body');
      body.textContent = skills[i].description || '';
      card.querySelector('.skill-header').addEventListener('click', function() {
        var expanded = card.classList.toggle('expanded');
        body.style.display = expanded ? 'block' : 'none';
      });
    });
    // 绑定 slider 点击变色
    el.querySelectorAll('input[type=checkbox]').forEach(function(cb) {
      cb.addEventListener('change', function() {
        var dot = this.parentElement.querySelector('.slider-dot');
        var slider = this.parentElement.querySelector('.slider');

      });

// ── 会话管理 ──────────────────────────────────────────
function loadSessions() {

    var ws = data.workspaces || [];
    el.innerHTML = '<div style="display:flex;gap:8px;margin-bottom:12px"><input id="newSessionName" placeholder="新会话名称" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px" /><button onclick="createSubWorkspace()" style="padding:8px 16px;border:none;border-radius:6px;cursor:pointer;background:#4caf50;color:#fff;font-size:13px;white-space:nowrap">+ 新建</button></div>' +
      '<div style="display:flex;gap:8px;margin-bottom:16px"><select id="templateSelect" style="flex:1;padding:8px 12px;border:1px solid #ddd;border-radius:6px;font-size:13px"><option value="">从模板创建...</option>' +

          '<button onclick="connectToWorkspace(\'' + w.id + '\')" style="padding:6px 12px;border:1px solid #2196f3;border-radius:6px;cursor:pointer;background:#e3f2fd;color:#1565c0;font-size:12px;white-space:nowrap">连接</button>' +
          '<button onclick="forkWorkspace(\'' + w.id + '\')" style="padding:6px 10px;border:1px solid #9c27b0;border-radius:6px;cursor:pointer;background:#f3e5f5;color:#7b1fa2;font-size:12px">多开</button>' +
          '<button onclick="cloneWorkspace(\'' + w.id + '\')" style="padding:6px 10px;border:1px solid #ff9800;border-radius:6px;cursor:pointer;background:#fff3e0;color:#e65100;font-size:12px">复制</button>' +
          '<button onclick="makeTemplate(\'' + w.id + '\')" style="padding:6px 10px;border:1px solid #607d8b;border-radius:6px;cursor:pointer;background:#eceff1;color:#455a64;font-size:12px">模板</button>' +
          (!isMain ? '<button onclick="deleteWorkspace(\'' + w.id + '\')" style="padding:6px 10px;border:1px solid #e57373;border-radius:6px;cursor:pointer;background:#fff;color:#e53935;font-size:12px">✕</button>' : '') +
          '</div>';
      }).join('') + (ws.filter(function(w) { return (w.kind === 'session' || w.kind === 'fork'); }).length === 0 ? '<p style="color:#888;font-size:13px">暂无会话</p>' : '');
  // 模板列表

    tmplHtml += tmpls.map(function(w) {
      return '<div style="background:#fff;padding:14px 16px;border-radius:8px;border:1px solid #e0e0e0;display:flex;align-items:center;gap:10px">' +
        '<div style="flex:1;min-width:0"><strong style="font-size:14px;color:#333">' + w.label + '</strong>' +
        '<p style="margin:2px 0 0;font-size:12px;color:#aaa">模板</p></div>' +
        '<button onclick="deleteWorkspace(\'' + w.id + '\')" style="padding:6px 10px;border:1px solid #e57373;border-radius:6px;cursor:pointer;background:#fff;color:#e53935;font-size:12px">删除</button></div>';
    }).join('');

  }).catch(function() { el.innerHTML = '<p style="color:#e53935">加载失败</p>'; });
}

function createSubWorkspace() {
  var name = document.getElementById('newSessionName').value.trim();
  if (!name) { alert('请输入会话名称'); return; }
  fetch('/api/workspaces/create', { method: 'POST', headers: {"Content-Type":"application/json"}, body: JSON.stringify({ session_id: 'sub:' + name }) })
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.status === 'ok') { loadSessions(); } else { alert(d.message); } })
    .catch(function() { alert('创建失败'); });
}

function createFromTemplate() {
  var name = document.getElementById('newSessionName').value.trim();
  var tmpl = document.getElementById('templateSelect').value;
  if (!tmpl) { alert('请选择模板'); return; }
  if (!name) { alert('请输入新会话名称'); return; }
  fetch('/api/workspaces/from-template', { method: 'POST', headers: {"Content-Type":"application/json"}, body: JSON.stringify({ template: tmpl, new_id: 'sub:' + name }) })
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.status === 'ok') { loadSessions(); } else { alert(d.message); } })
    .catch(function() { alert('创建失败'); });
}

function cloneWorkspace(source) {
  var label = prompt('新会话名称：', source.replace('sub:','') + '-clone');
  if (!label) return;
  fetch('/api/workspaces/' + encodeURIComponent(source) + '/clone', { method: 'POST', headers: {"Content-Type":"application/json"}, body: JSON.stringify({ new_id: 'sub:' + label }) })
    .then(function(r) { return r.json(); })
    .then(function(d) { if (d.status === 'ok') { loadSessions(); } else { alert(d.message); } })
    .catch(function() { alert('复制失败'); });
}

function deleteWorkspace(name) {
  if (!confirm('确定删除会话 "' + name + '"？所有记忆文件将丢失。')) return;
  fetch('/api/workspaces/' + encodeURIComponent(name), { method: 'DELETE' })
    .then(function() { loadSessions(); })
    .catch(function() { alert('删除失败'); });
}

function makeTemplate(source) {
  var name = prompt('模板名称：', source.replace('sub:','') + '-template');
  if (!name) return;
  fetch('/api/workspaces/' + encodeURIComponent(source) + '/template', {
    method: 'POST', headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ template_name: name })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.status === 'ok') { loadSessions(); alert('模板已创建: ' + name); }
    else { alert(d.message); }
  }).catch(function() { alert('创建模板失败'); });
}

function connectToWorkspace(session_id) {
  document.getElementById('sessionStatus').textContent = '切换中...';
  _switching = true;
  if (ws) { ws.close(); ws = null; }
  sessionId = session_id;
  connectTo(session_id);
}

function forkWorkspace(source) {
  var label = prompt('新 session 名称（多开，共享记忆）：', source + '-fork');
  if (!label) return;
  var newId = label;
  document.getElementById('sessionStatus').textContent = '多开中...';
  fetch('/api/workspaces/' + encodeURIComponent(source) + '/fork', {
    method: 'POST', headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ new_id: newId })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.status === 'ok') {
      loadSessions();
      // 自动切换到新多开
      _switching = true;
      if (ws) { ws.close(); ws = null; }
      sessionId = newId;
      connectTo(newId);
    } else { alert(d.message); }
  }).catch(function() { alert('多开失败'); });
}

// ── 连接管理 ──────────────────────────────────────────
function toggleConnect() {
  if (ws && ws.readyState === WebSocket.OPEN) { disconnect(); }
  else { connect(); }
}

function connect() {
  sessionId = 'main';
  var url = 'ws://' + window.location.host + '/ws/' + sessionId;
  ws = new WebSocket(url);
  ws.onmessage = function(e) {
    try { handleMessage(JSON.parse(e.data)); }
    catch(err) { console.log('parse error', e.data); }
  };
  ws.onopen = function() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('sessionStatus').textContent = '';
    addMsg('system', '已连接: ' + sessionId);
    refreshSessionList();
  };
  ws.onclose = function() {
    if (_switching) { _switching = false; return; }
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
  };
  ws.onerror = function() {
    addMsg('system', '连接失败');
  };
}

function switchSession(sid) {
  if (!sid || sid === sessionId) return;
  sessionId = sid;
  document.getElementById('sessionSelect').value = sid;
  document.getElementById('deleteSessionBtn').style.display = (sid !== 'main') ? 'inline-block' : 'none';
  document.getElementById('sessionStatus').textContent = '切换中...';
  _switching = true;
  if (ws) { ws.close(); ws = null; }
  connectTo(sid);
}

function createSession() {
  var name = prompt('输入新会话名称：', 'session-' + Date.now().toString(36));
  if (!name) return;
  document.getElementById('sessionStatus').textContent = '创建中...';
  _switching = true;
  if (ws) { ws.close(); ws = null; }
  connectTo(name);
}

function connectTo(sid) {
  var url = 'ws://' + window.location.host + '/ws/' + sid;
  ws = new WebSocket(url);
  ws.onmessage = function(e) {
    try { handleMessage(JSON.parse(e.data)); }
    catch(err) { console.log('parse error', e.data); }
  };
  ws.onopen = function() {
    document.getElementById('sessionStatus').textContent = '';
    document.getElementById('msgInput').disabled = false;
    document.getElementById('sendBtn').disabled = false;
    addMsg('system', '已连接: ' + sid);
    refreshSessionList();
  };
  ws.onclose = function() {
    document.getElementById('msgInput').disabled = true;
    document.getElementById('sendBtn').disabled = true;
    addMsg('system', '已断开: ' + sid);
    refreshSessionList();
  };
  ws.onerror = function() {
    document.getElementById('sessionStatus').textContent = '连接失败';
  };
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
}

// ── 发送消息 ──────────────────────────────────────────
function send() {
  var input = document.getElementById('msgInput');
  var text = input.value.trim();
  if (!text || !ws) return;
  input.value = '';
  ws.send(JSON.stringify({ type: 'text', content: text }));
  addMsg('user', text);
}

function addMsg(role, text, asHtml) {
  var div = document.createElement('div');
  div.className = 'msg ' + role;
  if (asHtml) { div.innerHTML = text; }
  else if (role === 'assistant' && typeof marked !== 'undefined' && typeof marked.parse === 'function' && text) {
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }
  document.getElementById('chat').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

// ── 处理 WS 消息 ──────────────────────────────────────
function handleMessage(msg) {
  switch (msg.type) {
    case 'assistant':
      if (msg.mode === 'end') { }
      else if (msg.mode === 'figure') { addMsg('assistant', '[图片]'); }
      else { addMsg('assistant', msg.content || ''); }
      break;
    case 'tool_result':
      renderToolResult(msg); break;
    case 'tool_start':
      renderToolStart(msg); break;
    case 'error':
      addMsg('system', '错误: ' + (msg.message || msg.code || '')); break;
    case 'component_register':
      renderComponent(msg); break;
    case 'component_update':
      updateComponent(msg); break;
    case 'component_destroy':
      destroyComponent(msg.component_id); break;
    case 'chat_history':
      if (msg.role === 'user' && msg.content) { addMsg('user', msg.content); }
      else if (msg.role === 'assistant' && msg.content) { addMsg('assistant', msg.content); }
      break;
  }
}

// ── 组件渲染 ──────────────────────────────────────────
function renderComponent(msg) {
  var schema = msg.schema || {};
  var cid = msg.component_id;
  var closable = schema.closable !== false;
  var box = document.createElement('div');
  box.className = 'component-inline';
  var header = document.createElement('div');
  header.className = 'component-header';
  header.innerHTML = '<span>' + (schema.title || (msg.tool_id || '\u7ec4\u4ef6')) + '</span>';
  if (closable) {
    var btn = document.createElement('button');
    btn.className = 'component-close';
    btn.textContent = '\u00d7';
    btn.onclick = function() { dismissComponent(cid); };
    header.appendChild(btn);
  }
  box.appendChild(header);
  var body = document.createElement('div');
  body.className = 'component-body';
  box.appendChild(body);
  document.getElementById('chat').appendChild(box);
  box.scrollIntoView({ behavior: 'smooth' });
  if (schema.type === 'custom' && schema.component_url) {
    loadIframeComponent(body, cid, msg.session_id, schema);
  } else {
    renderBuiltin(body, cid, schema);
  }
  components[cid] = { el: box, body: body };
}

function loadIframeComponent(container, cid, sid, schema) {
  var iframe = document.createElement('iframe');
  iframe.src = schema.component_url;
  iframe.sandbox = 'allow-scripts';
  container.appendChild(iframe);
  iframe.onload = function() {
    iframe.contentWindow.postMessage({
      type: 'tclaw_component_init', component_id: cid, session_id: sid,
      initial_data: schema.initial_data || {},
    }, '*');
  };
  if (components[cid]) components[cid].iframe = iframe;
}

function _componentCallback(cid, event, data) {
  if (ws) { ws.send(JSON.stringify({ type: 'component_callback', component_id: cid, result: { event: event, data: data } })); }
  destroyComponent(cid);
}

function escapeHtml(str) {
  var div = document.createElement('div');
  div.appendChild(document.createTextNode(String(str || '')));
  return div.innerHTML;
}

function renderBuiltin(container, cid, schema) {
  var type = schema.type || 'input';
  var prompt = schema.prompt || schema.placeholder || '';
  if (type === 'select' && schema.options) {
    var html = prompt ? '<p style="padding:12px 16px 0;font-weight:600">' + prompt + '</p>' : '';
    html += '<div style="padding:8px 16px 16px;display:flex;flex-direction:column;gap:6px">';
    schema.options.forEach(function(opt) {
      html += '<button onclick="callbackBuiltin(\'' + cid + '\',\'on_select\',{value:\' + (opt.value || opt.label) + \'})" style="padding:8px 12px;border:1px solid #ddd;border-radius:6px;background:#fff;cursor:pointer;text-align:left">' + (opt.label || opt.value) + '</button>';
    });
    html += '</div>';
    container.innerHTML = html;
  } else if (type === 'confirm') {
    container.innerHTML = '<div style="padding:16px;text-align:center"><p>' + prompt + '</p><div style="margin-top:12px;display:flex;gap:8px;justify-content:center"><button onclick="callbackBuiltin(\'' + cid + '\',\'confirm\',{confirmed:true})" style="padding:8px 24px;background:#4caf50;color:#fff;border:none;border-radius:6px;cursor:pointer">' + (schema.confirm_text || '\u786e\u5b9a') + '</button><button onclick="callbackBuiltin(\'' + cid + '\',\'cancel\',{confirmed:false})" style="padding:8px 24px;background:#f5f5f5;border:1px solid #ddd;border-radius:6px;cursor:pointer">' + (schema.cancel_text || '\u53d6\u6d88') + '</button></div></div>';
  } else {
    container.innerHTML = '<div style="padding:16px"><p style="font-weight:600">' + prompt + '</p><textarea id="input_' + cid + '" rows="3" style="width:100%;padding:8px;border:1px solid #ddd;border-radius:6px;font-size:14px;box-sizing:border-box"></textarea><button onclick="callbackBuiltin(\'' + cid + '\',\'submit\',{text:document.getElementById(\'input_\' + cid + \').value})" style="margin-top:8px;padding:8px 24px;background:#2196f3;color:#fff;border:none;border-radius:6px;cursor:pointer;float:right">\u63d0\u4ea4</button></div>';
  }
}

function callbackBuiltin(cid, event, data) {
  if (ws) {
    ws.send(JSON.stringify({ type: 'component_callback', component_id: cid, result: { event: event, data: data } }));
  }
  destroyComponent(cid);
}

function updateComponent(msg) {
  var comp = components[msg.component_id];
  if (!comp || !comp.iframe || !comp.iframe.contentWindow) return;
  comp.iframe.contentWindow.postMessage({ type: 'tclaw_component_update', component_id: msg.component_id, data: msg.data }, '*');
}

function dismissComponent(cid) {
  if (ws) { ws.send(JSON.stringify({ type: 'component_callback', component_id: cid, result: { event: 'dismiss', data: {} } })); }
  destroyComponent(cid);
}

function destroyComponent(cid) {
  var comp = components[cid];
  if (!comp) return;
  if (comp.el && comp.el.parentNode) { comp.el.parentNode.removeChild(comp.el); }
  delete components[cid];
}

// ── 工具卡片 ─────────────────────────────────────────────
function renderToolStart(msg) {
  var args = msg.args || {};
  var argsStr = JSON.stringify(args).slice(0, 200);
  addMsg('tool',
    '<div style="padding:4px 8px;background:#f0f7ff;border:1px solid #d0e3f7;border-radius:4px;font-size:12px;line-height:1.4">' +
    '\u25b6 ' + (msg.tool_id || '?') + ' ' + (argsStr !== '{}' ? argsStr.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '') +
    '</div>', true);
}

function renderToolResult(msg) {
  var color = (msg.status === 'error') ? '#d32f2f' : '#2e7d32';
  addMsg('tool',
    '<div style="padding:4px 8px;background:#f5f5f5;border:1px solid #e0e0e0;border-radius:4px;font-size:12px">' +
    '\u2713 ' + (msg.tool_id || '?') + ' - ' + (msg.status || 'done') +
    '</div>', true);
}

// ── 日志 ─────────────────────────────────────────────────
function toggleLog() {
  var panel = document.getElementById('logPanel');
  panel.style.display = panel.style.display === 'flex' ? 'none' : 'flex';
  if (panel.style.display === 'flex') {
    fetchLogs();
    logTimer = setInterval(fetchLogs, 2000);
  } else {
    clearInterval(logTimer);
  }
}

async function fetchLogs() {
  try {
    var r = await fetch('/api/logs');
    var data = await r.json();
    renderLogs(data.logs);
  } catch(e) {}
}

function renderLogs(logs) {
  var body = document.getElementById('logBody');
  body.innerHTML = logs.map(function(l) {
    return '<div class="log-line ' + l.level + '">[' + l.time + '] [' + l.level + '] ' + l.name + ': ' + l.message + '</div>';
  }).join('');
  if (logAutoScroll) body.scrollTop = body.scrollHeight;
}

function clearLogs() {
  fetch('/api/logs/clear', {method:'POST'});
  document.getElementById('logBody').innerHTML = '';
}

function toggleAutoScroll() {
  logAutoScroll = !logAutoScroll;
}

// ── 会话列表 ────────────────────────────────────────────
function refreshSessionList() {
  fetch('/api/workspaces').then(function(r) { return r.json(); }).then(function(data) {
    var sel = document.getElementById('sessionSelect');
    var current = sel.value;
    sel.innerHTML = '';
    var sessions = data.workspaces ? data.workspaces.filter(function(w) { return (w.kind === 'session' || w.kind === 'fork'); }) : [];
    sessions.forEach(function(s) {
      var o = document.createElement('option');
      o.value = s.id; o.textContent = s.label + (s.id === 'main' ? '' : ' (sub)');
      sel.appendChild(o);
    });
    // 恢复当前选中
    if (current && document.querySelector('#sessionSelect option[value="' + current + '"]')) {
      sel.value = current;
    }
    // 更新删除按钮可见性（main 不可删）
    var delBtn = document.getElementById('deleteSessionBtn');
    delBtn.style.display = (sel.value && sel.value !== 'main') ? 'inline-block' : 'none';
  }).catch(function() {});
}

function deleteSession() {
  var sid = document.getElementById('sessionSelect').value;
  if (!sid || sid === 'main') { alert('main 会话不可删除'); return; }
  if (!confirm('确定删除会话 "' + sid + '"？所有聊天记录将丢失。')) return;
  fetch('/api/workspaces/' + encodeURIComponent(sid), { method: 'DELETE' }).then(function(r) {
    return r.json();
  }).then(function() {
    // 如果删的是当前 session，切回 main
    if (sid === sessionId) {
      _switching = true;
      if (ws) { ws.close(); ws = null; }
      sessionId = 'main';
      connectTo('main');
    }
    refreshSessionList();
  }).catch(function() { alert('删除失败'); });
}

function resetSession() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({type: "reset"}));
  document.getElementById("chat").innerHTML = "";
  addMsg("system", "\u4f1a\u8bdd\u5df2\u91cd\u7f6e");
}

function toggleTools() {
  var panel = document.getElementById('toolsPanel');
  var shown = panel.style.display !== 'none';
  panel.style.display = shown ? 'none' : 'flex';
  if (!shown) document.getElementById('compactDialog').style.display = 'none';
}

function showCompactDialog() {
  document.getElementById('compactDialog').style.display = 'flex';
  document.getElementById('compactPrompt').value = '';
  document.getElementById('compactPrompt').focus();
}

function hideCompactDialog() {
  document.getElementById('compactDialog').style.display = 'none';
}

function doCompact() {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  var prompt = document.getElementById('compactPrompt').value.trim();
  ws.send(JSON.stringify({type: "compact", prompt: prompt}));
  addMsg("system", "\u5df2\u53d1\u8d77\u4e0a\u4e0b\u6587\u538b\u7f29...");
  hideCompactDialog();
  document.getElementById('toolsPanel').style.display = 'none';
}

// ── \u5b9a\u65f6\u4efb\u52a1 ──────────────────────────────────────────
function showScheduler() {
  document.getElementById('schedulerDialog').style.display = 'flex';
  refreshSchedulerList();

}

function toggleSchedType() {
  var t = document.getElementById('schedType').value;
  document.getElementById('schedAt').style.display = t === 'at' ? 'inline-block' : 'none';
  document.getElementById('schedEvery').style.display = t === 'every' ? 'inline-block' : 'none';
  document.getElementById('schedCron').style.display = t === 'cron' ? 'inline-block' : 'none';
}

function addSchedulerTask() {
  var name = document.getElementById('schedName').value.trim() || 'task-' + Date.now().toString(36);
  var target = sessionId;
  var msg = document.getElementById('schedMsg').value.trim();
  if (!msg) { alert('\u8bf7\u8f93\u5165\u6d88\u606f\u5185\u5bb9'); return; }
  var type = document.getElementById('schedType').value;
  var schedule = {};
  if (type === 'at') {
    var dt = document.getElementById('schedAt').value;
    if (!dt) { alert('\u8bf7\u9009\u62e9\u65f6\u95f4'); return; }
    schedule = { kind: 'at', at: new Date(dt).getTime() };
  } else if (type === 'every') {
    var ms = parseInt(document.getElementById('schedEvery').value);
    if (!ms || ms < 1000) { alert('\u95f4\u9694\u81f3\u5c11 1000ms'); return; }
    schedule = { kind: 'every', every_ms: ms };
  } else if (type === 'cron') {
    var expr = document.getElementById('schedCron').value.trim();
    if (!expr) { alert('\u8bf7\u8f93\u5165 cron \u8868\u8fbe\u5f0f'); return; }
    schedule = { kind: 'cron', expr: expr };
  }
  fetch('/api/scheduler', {
    method: 'POST', headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ id: name, name: name, target_session: target, message: msg, schedule: schedule })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.status === 'ok') {
      refreshSchedulerList();
      document.getElementById('schedName').value = '';
      document.getElementById('schedMsg').value = '';
    }
  }).catch(function() { alert('\u6dfb\u52a0\u5931\u8d25'); });
}

function deleteSchedulerTask(id) {
  if (!confirm('\u5220\u9664\u5b9a\u65f6\u4efb\u52a1 "' + id + '"?')) return;
  fetch('/api/scheduler/' + encodeURIComponent(id), { method: 'DELETE' })
    .then(function() { refreshSchedulerList(); })
    .catch(function() {});
}

function refreshSchedulerList() {
  fetch('/api/scheduler').then(function(r) { return r.json(); }).then(function(d) {
    var el = document.getElementById('schedulerList');
    var tasks = d.tasks || [];
    if (!tasks.length) { el.innerHTML = '<p style="color:#aaa;font-size:12px">\u6682\u65e0\u5b9a\u65f6\u4efb\u52a1</p>'; return; }
    el.innerHTML = tasks.map(function(t) {
      var info = t.schedule.kind === 'at' ? new Date(t.schedule.at).toLocaleString() :
        t.schedule.kind === 'every' ? '\u6bcf ' + (t.schedule.every_ms/1000) + 's' :
        t.schedule.kind === 'cron' ? t.schedule.expr : '?';
      return '<div style="display:flex;align-items:center;gap:6px;padding:6px 8px;background:#fff;border:1px solid #eee;border-radius:4px">' +
        '<span style="flex:1;font-size:12px;color:' + (t.disabled ? '#aaa' : '#333') + '">' +
        '<strong>' + t.name + '</strong> ' + info + ' \u2192 ' + t.target_session + '</span>' +
        '<button onclick="deleteSchedulerTask(\'' + t.id + '\')\" style="padding:2px 8px;border:1px solid #e57373;border-radius:4px;cursor:pointer;background:#fff;color:#e53935;font-size:11px">\u2715</button></div>';
    }).join('');
  }).catch(function() {});
}

window.addEventListener('message', function(e) {
  var data = e.data;
  if (!data || data.type !== 'tclaw_component_event') return;
  if (ws) {
    ws.send(JSON.stringify({ type: 'component_callback', component_id: data.component_id, result: { event: data.event, data: data.data } }));
  }
});

// ── 初始化 ────────────────────────────────────────────────
switchTab('chat');
</script><script>
(function() {
  var loc = window.location;
  var proto = loc.protocol === 'https:' ? 'wss:' : 'ws:';
  document.getElementById('wsUrl').value = proto + '//' + loc.host + '/ws';
})();
</script>
